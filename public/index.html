<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LobbyBot 2.0 Manager</title>
  <style>
    :root {
      --bgColor: #0f2027;
      --gradient1: #203a43;
      --gradient2: #2c5364;
      --accentColor: #00d2ff;
      --dangerColor: #e74c3c;
      --successColor: #2ecc71;
      --font: 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: linear-gradient(to right, var(--bgColor), var(--gradient1), var(--gradient2));
        color: white;
        font-family: var(--font);
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
        width: 300px;
        background: rgba(0, 0, 0, 0.3);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
    }
    .sidebar-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
    }
    .sidebar-header h2 { font-size: 1.2rem; margin-bottom: 10px; }

    .search-box {
        padding: 9px 12px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255,255,255,0.15);
        width: 100%;
        color: white;
        border-radius: 5px;
        font-family: var(--font);
        font-size: 0.9rem;
        transition: border-color 0.2s;
    }
    .search-box:focus { outline: none; border-color: var(--accentColor); }
    .search-box::placeholder { color: rgba(255,255,255,0.4); }

    /* LANGUAGE SWITCHER */
    .lang-switcher {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 12px;
    }
    .lang-btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 5px;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        transition: all 0.15s;
        color: white;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .lang-btn span.code {
        font-size: 0.65rem;
        opacity: 0.7;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
    .lang-btn.active {
        background: rgba(0,210,255,0.15);
        border-color: var(--accentColor);
        color: var(--accentColor);
    }
    .lang-btn.active .code { opacity: 1; }

    /* BOT LIST */
    .bot-list { flex: 1; overflow-y: auto; }
    .bot-item {
        padding: 13px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.15s;
    }
    .bot-item:hover { background: rgba(255, 255, 255, 0.05); }
    .bot-item.active { background: rgba(0, 210, 255, 0.15); border-left: 3px solid var(--accentColor); }
    .bot-item-left { display: flex; flex-direction: column; gap: 2px; }
    .bot-item-name { font-size: 0.9rem; font-weight: 500; }
    .bot-item-friends { font-size: 0.75rem; opacity: 0.5; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
    .offline { background: #e74c3c; box-shadow: 0 0 6px #e74c3c; }
    .partial { background: #f39c12; box-shadow: 0 0 6px #f39c12; }

    .sidebar-footer {
        padding: 14px 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .admin-link {
        display: block;
        text-align: center;
        color: rgba(255,255,255,0.5);
        text-decoration: none;
        font-size: 0.82rem;
        transition: color 0.2s;
        padding: 6px;
        border-radius: 4px;
        border: 1px solid rgba(255,255,255,0.08);
    }
    .admin-link:hover { color: var(--accentColor); border-color: rgba(0,210,255,0.3); }

    /* MAIN CONTENT */
    .main-content {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
    }
    .empty-state { text-align: center; opacity: 0.45; margin-top: 120px; }
    .empty-state h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; }

    /* CONTROL PANEL */
    .control-panel { display: none; max-width: 800px; margin: 0 auto; }
    .control-panel.visible { display: block; }

    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 20px;
    }
    .panel-header h1 { font-size: 1.5rem; }
    .panel-header-actions { display: flex; gap: 8px; }

    .info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
    }
    .info-card {
        background: rgba(255,255,255,0.05);
        padding: 14px;
        border-radius: 8px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .info-label { opacity: 0.6; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-value { font-size: 1.4rem; font-weight: bold; margin-top: 5px; }

    .section-title {
        margin: 28px 0 14px 0;
        font-size: 1rem;
        border-left: 3px solid var(--accentColor);
        padding-left: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        opacity: 0.85;
    }

    .action-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    button {
        background: transparent;
        color: var(--accentColor);
        border: 1px solid var(--accentColor);
        padding: 10px 16px;
        cursor: pointer;
        border-radius: 5px;
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        width: 100%;
        transition: all 0.15s;
        font-family: var(--font);
    }
    button:hover:not(:disabled) { background: var(--accentColor); color: #0f2027; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.danger { color: var(--dangerColor); border-color: var(--dangerColor); }
    button.danger:hover:not(:disabled) { background: var(--dangerColor); color: white; }
    button.small { width: auto; padding: 6px 12px; font-size: 0.7rem; }

    .input-group { display: flex; gap: 10px; margin-top: 10px; }
    .input-group input {
        flex: 1;
        padding: 10px 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        color: white;
        border-radius: 5px;
        font-family: var(--font);
        font-size: 0.9rem;
        transition: border-color 0.2s;
    }
    .input-group input:focus { outline: none; border-color: var(--accentColor); }
    .input-group input::placeholder { color: rgba(255,255,255,0.35); }
    .input-group button { flex-shrink: 0; width: auto; min-width: 100px; }

    /* TOAST */
    .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }
    .toast {
        background: rgba(12, 28, 36, 0.96);
        border: 1px solid var(--accentColor);
        padding: 11px 16px;
        border-radius: 7px;
        color: white;
        min-width: 230px;
        max-width: 320px;
        font-size: 0.88rem;
        animation: toastIn 0.25s ease;
        pointer-events: all;
        display: flex;
        align-items: center;
        gap: 10px;
        line-height: 1.3;
    }
    .toast.success { border-color: #2ecc71; }
    .toast.error   { border-color: #e74c3c; }
    .toast.info    { border-color: var(--accentColor); }
    @keyframes toastIn  { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* MODAL */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
        background: rgba(15, 32, 39, 0.98);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        padding: 30px;
        width: 480px;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal label { display: block; margin-bottom: 4px; font-size: 0.85rem; opacity: 0.7; }
    .modal input, .modal textarea, .modal select {
        width: 100%;
        padding: 8px 12px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        color: white;
        border-radius: 5px;
        font-family: var(--font);
        font-size: 0.9rem;
        margin-bottom: 12px;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accentColor); }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-buttons button { width: auto; }
  </style>
</head>
<body>

  <div id="toastContainer" class="toast-container"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2 data-i18n="title">🤖 Bot Manager</h2>
      <input type="text" class="search-box" id="searchBox"
             data-i18n-placeholder="searchPlaceholder"
             placeholder="Search bots..."
             oninput="filterBots(this.value)">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 <span class="code">EN</span></button>
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">🇫🇷 <span class="code">FR</span></button>
        <button class="lang-btn" data-lang="es" onclick="setLang('es')">🇪🇸 <span class="code">ES</span></button>
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">🇩🇪 <span class="code">DE</span></button>
      </div>
    </div>
    <div id="botList" class="bot-list"></div>
    <div class="sidebar-footer">
      <a href="/commands" class="admin-link" data-i18n="commandsLink" style="margin-bottom:8px;">📖 Commands</a>
      <a href="/admin" class="admin-link" data-i18n="adminLink">⚙️ Admin Panel</a>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-content">
    <div id="emptyState" class="empty-state">
      <h1 data-i18n="emptyTitle">Select a Bot</h1>
      <p data-i18n="emptyDesc">Choose a bot from the sidebar to manage commands.</p>
    </div>

    <div id="controlPanel" class="control-panel">
      <div class="panel-header">
        <h1 id="selectedBotName">Bot Name</h1>
        <div class="panel-header-actions">
          <span id="selectedBotStatus" class="status-dot"></span>
          <button class="small" onclick="showAddFriendModal()" data-i18n="btnAddFriend">+ Add Friend</button>
          <button class="small danger" onclick="removeFriend()" data-i18n="btnRemoveFriend">Remove Friend</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="info-label" data-i18n="labelFriends">Friends</div>
          <div class="info-value" id="valFriends">-</div>
        </div>
        <div class="info-card">
          <div class="info-label" data-i18n="labelStatus">Status</div>
          <div class="info-value" id="valStatus">-</div>
        </div>
        <div class="info-card">
          <div class="info-label" data-i18n="labelPing">Ping</div>
          <div class="info-value" id="valPing">— ms</div>
        </div>
      </div>

      <h3 class="section-title" data-i18n="sectionParty">Party Management</h3>
      <div class="action-grid">
        <button onclick="sendAction('leave', null, this)"      data-i18n="btnLeave">Leave Party</button>
        <button onclick="sendAction('privacy', 'public', this)" data-i18n="btnPublic">Set Public</button>
        <button onclick="sendAction('privacy', 'private', this)" data-i18n="btnPrivate">Set Private</button>
        <button onclick="sendAction('privacy', 'friends', this)" data-i18n="btnFriends">Friends Only</button>
        <button onclick="sendAction('ready', null, this)"      data-i18n="btnReady">Ready</button>
        <button onclick="sendAction('unready', null, this)"    data-i18n="btnUnready">Unready</button>
      </div>

      <h3 class="section-title" data-i18n="sectionPlayers">Player Management</h3>
      <div class="input-group">
        <input type="text" id="kickInput" data-i18n-placeholder="kickPlaceholder" placeholder="Username to kick">
        <button onclick="sendInput('kick','kickInput',this)" data-i18n="btnKick">KICK</button>
      </div>
      <div class="input-group">
        <input type="text" id="promoteInput" data-i18n-placeholder="promotePlaceholder" placeholder="Username to promote">
        <button onclick="sendInput('promote','promoteInput',this)" data-i18n="btnPromote">PROMOTE</button>
      </div>

      <h3 class="section-title" data-i18n="sectionSocial">Social</h3>
      <div class="input-group">
        <input type="text" id="addInput" data-i18n-placeholder="addPlaceholder" placeholder="Add friend">
        <button onclick="sendInput('add','addInput',this)" data-i18n="btnAdd">ADD</button>
      </div>

      <h3 class="section-title" data-i18n="sectionCosmetics">Cosmetics</h3>
      <div class="action-grid">
        <div class="input-group" style="margin-top:0">
          <input type="text" id="skinInput" data-i18n-placeholder="skinPlaceholder" placeholder="Skin name">
          <button onclick="sendInput('skin','skinInput',this)" data-i18n="btnSkin">SKIN</button>
        </div>
        <div class="input-group" style="margin-top:0">
          <input type="text" id="backpackInput" data-i18n-placeholder="backpackPlaceholder" placeholder="Backpack name">
          <button onclick="sendInput('backpack','backpackInput',this)" data-i18n="btnBackpack">BACKPACK</button>
        </div>
        <div class="input-group" style="margin-top:0">
          <input type="text" id="pickaxeInput" data-i18n-placeholder="pickaxePlaceholder" placeholder="Pickaxe name">
          <button onclick="sendInput('pickaxe','pickaxeInput',this)" data-i18n="btnPickaxe">PICKAXE</button>
        </div>
        <div class="input-group" style="margin-top:0">
          <input type="text" id="emoteInput" data-i18n-placeholder="emotePlaceholder" placeholder="Emote name">
          <button onclick="sendInput('emote','emoteInput',this)" data-i18n="btnEmote">EMOTE</button>
        </div>
        <div class="input-group" style="margin-top:0">
          <input type="text" id="levelInput" data-i18n-placeholder="levelPlaceholder" placeholder="Level (1-1000)">
          <button onclick="sendInput('level','levelInput',this)" data-i18n="btnLevel">LEVEL</button>
        </div>
        <button onclick="sendAction('stopdanse', null, this)" data-i18n="btnStopDance">STOP DANCE</button>
      </div>
    </div>
  </div>

  <!-- ADD FRIEND MODAL -->
  <div id="addFriendModal" class="modal-overlay" onclick="if(event.target===this)closeAddFriendModal()">
    <div class="modal">
      <h3 data-i18n="modalAddFriend">Add Friend</h3>
      <input type="text" id="afName" data-i18n-placeholder="afPlaceholder" placeholder="Epic Username">
      <div class="modal-buttons">
        <button class="small" onclick="closeAddFriendModal()" data-i18n="cancel">Cancel</button>
        <button class="small" onclick="confirmAddFriend()" data-i18n="confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ACTIVITY LOG MODAL -->
  <div id="activityModal" class="modal-overlay" onclick="if(event.target===this)closeActivityModal()">
    <div class="modal" style="width:600px">
      <h3 data-i18n="activityLog">Activity Log</h3>
      <div id="activityList" style="max-height:400px;overflow-y:auto;font-size:0.85rem;"></div>
      <div class="modal-buttons">
        <button class="small" onclick="closeActivityModal()" data-i18n="close">Close</button>
      </div>
    </div>
  </div>

    let currentLang = localStorage.getItem('dashboard_lang') || 'en';

    function t(key) {
      return (i18n[currentLang] && i18n[currentLang][key]) || (i18n['en'][key]) || key;
    }

    function setLang(lang) {
      if (!i18n[lang]) return;
      currentLang = lang;
      localStorage.setItem('dashboard_lang', lang);
      applyTranslations();
      renderBotList();
      updateSelectedView();
      showToast(t('langChanged'), 'info', 2000);
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      document.documentElement.lang = currentLang;
    }

    function showToast(message, type = 'info', duration = 3500) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.25s ease forwards';
        setTimeout(() => toast.remove(), 250);
      }, duration);
    }

    // ═══════════════════════════════════════
    //   SOCKET + API
    // ═══════════════════════════════════════
    const socket = io();
    let allBots = [];
    let selectedBot = null;
    let rtBots = {}; // real-time data from manager

    socket.on('connect', () => showToast(t('toastConnected'), 'success', 2000));
    socket.on('disconnect', () => showToast(t('toastDisconnected'), 'error'));

    socket.on('manager:bots', (bots) => {
      rtBots = {};
      for (const b of bots) {
        rtBots[b.name] = { isOnline: b.isOnline ?? true, friends: b.friends ?? 0, ping: b.ping };
      }
      // Refresh from API to get DB bots merged
      refreshBots();
    });

    socket.on('action:sent', (data) => {
      const labels = { leave: () => t('actionLeave'), privacy: () => t('actionPrivacy'), kick: () => t('actionKick'), promote: () => t('actionPromote'), add: () => t('actionAdd'), remove: () => t('actionRemove') };
      const label = (labels[data.action] || (() => data.action))();
      showToast(`${label} ${t('actionSent')} ${data.target}`, 'success');
    });

    socket.on('action:result', (data) => {
      showToast(data.message || (data.success ? t('actionSuccess') : t('actionError')), data.success ? 'success' : 'error');
    });

    // ── Load bots from API ──
    async function refreshBots() {
      try {
        const res = await fetch('/api/bots');
        const bots = await res.json();
        // Merge with RT data
        allBots = bots.map(b => {
          const rt = rtBots[b.name];
          return {
            name: b.name,
            email: b.email,
            isOnline: rt ? rt.isOnline : b.isOnline,
            friends: rt ? rt.friends : b.friends,
            ping: rt ? rt.ping : b.ping,
          };
        });
        renderBotList(document.getElementById('searchBox').value);
        updateSelectedView();
      } catch (e) {
        console.error('Failed to refresh bots:', e);
      }
    }

    // Poll API periodically (fallback when manager is offline)
    setInterval(refreshBots, 30000);

    // ═══════════════════════════════════════
    //   RENDERING
    // ═══════════════════════════════════════
    function renderBotList(filter = '') {
      const list = document.getElementById('botList');
      list.innerHTML = '';
      const filtered = allBots.filter(b => b.name.toLowerCase().includes(filter.toLowerCase()));
      if (filtered.length === 0) {
        list.innerHTML = `<div style="padding:24px;text-align:center;opacity:0.4;font-size:0.85rem">${t('noBots')}</div>`;
        return;
      }
      filtered.forEach(bot => {
        const div = document.createElement('div');
        div.className = `bot-item${selectedBot === bot.name ? ' active' : ''}`;
        div.innerHTML = `
          <div class="bot-item-left">
            <span class="bot-item-name">${bot.name}</span>
            <span class="bot-item-friends">${bot.friends ?? 0} ${t('friends')}</span>
          </div>
          <span class="status-dot ${bot.isOnline ? 'online' : 'offline'}"></span>
        `;
        div.onclick = () => selectBot(bot.name);
        list.appendChild(div);
      });
    }

    function selectBot(name) {
      selectedBot = name;
      renderBotList(document.getElementById('searchBox').value);
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('controlPanel').classList.add('visible');
      updateSelectedView();
    }

    function updateSelectedView() {
      if (!selectedBot) return;
      const bot = allBots.find(b => b.name === selectedBot);
      if (!bot) return;
      document.getElementById('selectedBotName').textContent = bot.name;
      document.getElementById('valFriends').textContent = bot.friends ?? '-';
      document.getElementById('valStatus').textContent = bot.isOnline ? t('online') : t('offline');
      document.getElementById('valPing').textContent = bot.ping ? `${bot.ping} ms` : '— ms';
      document.getElementById('selectedBotStatus').className = `status-dot ${bot.isOnline ? 'online' : 'offline'}`;
    }

    function filterBots(val) { renderBotList(val); }

    // ═══════════════════════════════════════
    //   ACTIONS
    // ═══════════════════════════════════════
    function sendAction(action, data = null, btn = null) {
      if (!selectedBot) { showToast(t('toastSelectBot'), 'error'); return; }
      const bot = allBots.find(b => b.name === selectedBot);
      if (bot && !bot.isOnline) { showToast(`${selectedBot} ${t('toastBotOffline')}`, 'error'); return; }
      if (btn) { btn.disabled = true; setTimeout(() => btn.disabled = false, 2000); }
      socket.emit('cmd:manager:action', { target: selectedBot, action, data });
    }

    function sendInput(action, inputId, btn = null) {
      const val = document.getElementById(inputId).value.trim();
      if (!val) { showToast(t('toastEnterName'), 'error'); return; }
      sendAction(action, val, btn);
      document.getElementById(inputId).value = '';
    }

    document.querySelectorAll('.input-group input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { const btn = input.nextElementSibling; if (btn) btn.click(); }
      });
    });

    // ═══════════════════════════════════════
    //   FRIEND MANAGEMENT
    // ═══════════════════════════════════════
    function showAddFriendModal() {
      document.getElementById('addFriendModal').classList.add('visible');
      document.getElementById('afName').value = '';
      document.getElementById('afName').focus();
    }

    function closeAddFriendModal() {
      document.getElementById('addFriendModal').classList.remove('visible');
    }

    function confirmAddFriend() {
      const name = document.getElementById('afName').value.trim();
      if (!name) { showToast(t('toastEnterName'), 'error'); return; }
      sendAction('add', name);
      closeAddFriendModal();
      showToast(t('friendAdded'), 'success');
    }

    function removeFriend() {
      const name = prompt(t('actionRemove') + ':');
      if (!name) { showToast(t('noFriendToRemove'), 'error'); return; }
      sendAction('remove', name);
      showToast(t('friendRemoved'), 'success');
    }

    // ═══════════════════════════════════════
    //   ACTIVITY LOG
    // ═══════════════════════════════════════
    socket.on('activity:log', (log) => {
      window._activityLog = log;
    });

    socket.on('activity:new', (event) => {
      if (!window._activityLog) window._activityLog = [];
      window._activityLog.unshift(event);
    });

    function showActivityModal() {
      const list = document.getElementById('activityList');
      const log = window._activityLog || [];
      if (log.length === 0) {
        list.innerHTML = '<p style="opacity:0.5;text-align:center;padding:20px;">No activity yet</p>';
      } else {
        list.innerHTML = log.map(e =>
          `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <span>${e.icon} </span><strong>${e.bot}</strong> — ${e.message}<br>
            <span style="opacity:0.5;font-size:0.75rem">${new Date(e.timestamp).toLocaleString()}</span>
          </div>`
        ).join('');
      }
      document.getElementById('activityModal').classList.add('visible');
    }

    function closeActivityModal() {
      document.getElementById('activityModal').classList.remove('visible');
    }

    // ═══════════════════════════════════════
    //   INIT
    // ═══════════════════════════════════════
    applyTranslations();
    refreshBots();
  </script>
