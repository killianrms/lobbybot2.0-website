<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LobbyBot — Commands</title>
  <style>
    :root {
      --bgColor: #0f2027;
      --gradient1: #203a43;
      --gradient2: #2c5364;
      --accentColor: #00d2ff;
      --premiumColor: #f1c40f;
      --font: 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(to right, var(--bgColor), var(--gradient1), var(--gradient2));
      color: white;
      font-family: var(--font);
      min-height: 100vh;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(10, 22, 28, 0.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
    }
    .back-link {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 12px;
      border-radius: 5px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--accentColor); border-color: rgba(0,210,255,0.4); }
    .topbar h1 { font-size: 1.15rem; flex: 1; }
    .search-box {
      padding: 8px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      border-radius: 5px;
      font-family: var(--font);
      font-size: 0.9rem;
      width: 230px;
    }
    .search-box:focus { outline: none; border-color: var(--accentColor); }
    .search-box::placeholder { color: rgba(255,255,255,0.4); }
    .lang-switcher { display: flex; gap: 6px; }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: white;
      transition: all 0.15s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); }
    .lang-btn.active { background: rgba(0,210,255,0.15); border-color: var(--accentColor); color: var(--accentColor); }

    .container { max-width: 1000px; margin: 0 auto; padding: 30px 24px 60px; }

    .intro {
      background: rgba(0,210,255,0.07);
      border: 1px solid rgba(0,210,255,0.25);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 30px;
    }
    .intro code { background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 4px; }

    .section-title {
      margin: 34px 0 6px 0;
      font-size: 1.05rem;
      border-left: 3px solid var(--accentColor);
      padding-left: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .section-title.premium { border-left-color: var(--premiumColor); color: var(--premiumColor); }
    .section-sub { opacity: 0.55; font-size: 0.82rem; margin: 0 0 16px 13px; }

    .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 760px) { .cmd-grid { grid-template-columns: 1fr; } .topbar h1 { flex-basis: 100%; order: -1; } }

    .cmd-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      padding: 14px 16px;
      transition: border-color 0.15s, transform 0.15s;
    }
    .cmd-card:hover { border-color: rgba(0,210,255,0.45); transform: translateY(-1px); }
    .cmd-card.premium { border-color: rgba(241,196,15,0.3); background: rgba(241,196,15,0.05); }
    .cmd-card.premium:hover { border-color: rgba(241,196,15,0.65); }
    .cmd-name {
      font-family: Consolas, monospace;
      font-size: 0.95rem;
      color: var(--accentColor);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cmd-card.premium .cmd-name { color: var(--premiumColor); }
    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f1c40f, #e67e22);
      color: #1a1a08;
      border-radius: 4px;
      padding: 2px 7px;
      font-family: var(--font);
    }
    .badge.admin { background: rgba(231,76,60,0.85); color: white; }
    .cmd-desc { font-size: 0.85rem; opacity: 0.85; margin-top: 7px; line-height: 1.45; }
    .cmd-desc code { background: rgba(255,255,255,0.1); padding: 0 5px; border-radius: 3px; font-size: 0.8rem; }
    .cmd-aliases { margin-top: 9px; display: flex; gap: 6px; flex-wrap: wrap; }
    .alias-chip {
      font-family: Consolas, monospace;
      font-size: 0.72rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2px 9px;
      opacity: 0.75;
    }

    .premium-cta {
      margin-top: 34px;
      background: linear-gradient(135deg, rgba(241,196,15,0.12), rgba(230,126,34,0.10));
      border: 1px solid rgba(241,196,15,0.4);
      border-radius: 12px;
      padding: 26px 28px;
      text-align: center;
    }
    .premium-cta h2 { color: var(--premiumColor); font-size: 1.25rem; margin-bottom: 10px; }
    .premium-cta p { font-size: 0.92rem; opacity: 0.9; max-width: 560px; margin: 0 auto 18px; line-height: 1.55; }
    .premium-btn {
      display: inline-block;
      background: linear-gradient(135deg, #f1c40f, #e67e22);
      color: #1a1a08;
      font-weight: 800;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 0.85rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .premium-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(241,196,15,0.35); }

    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  </style>
</head>

    <h2 class="section-title" data-i18n="secLobby">🎮 In-Game — Lobby</h2>
    <p class="section-sub" data-i18n="secLobbySub"></p>

    <h2 class="section-title" data-i18n="secDiscord">💬 Discord</h2>

    // ═══════════ RENDERING ═══════════
    let currentLang = localStorage.getItem('dashboard_lang') || 'en';
    function t(key) { return (i18n[currentLang] && i18n[currentLang][key]) || i18n['en'][key] || key; }

    function setLang(lang) {
      if (!i18n[lang]) return;
      currentLang = lang;
      localStorage.setItem('dashboard_lang', lang);
      applyTranslations();
      renderAll(document.getElementById('searchBox').value);
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
      document.querySelectorAll('[data-i18n-html]').forEach(el => el.innerHTML = t(el.getAttribute('data-i18n-html')));
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-placeholder')));
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
      document.documentElement.lang = currentLang;
    }

    function cardHTML(cmd) {
      const badges =
        (cmd.premium ? `<span class="badge">${t('premiumBadge')}</span>` : '') +
        (cmd.admin ? `<span class="badge admin">${t('adminBadge')}</span>` : '');
      const aliases = (cmd.aliases && cmd.aliases.length)
        ? `<div class="cmd-aliases">${cmd.aliases.map(a => `<span class="alias-chip">${a}</span>`).join('')}</div>`
        : '';
      return `<div class="cmd-card${cmd.premium ? ' premium' : ''}">
        <div class="cmd-name">${cmd.name}${badges}</div>
        <div class="cmd-desc">${cmd.desc[currentLang] || cmd.desc.en}</div>
        ${aliases}
      </div>`;
    }

    function matches(cmd, filter) {
      if (!filter) return true;
      const f = filter.toLowerCase();
      return cmd.name.toLowerCase().includes(f)
        || (cmd.aliases || []).some(a => a.toLowerCase().includes(f))
        || (cmd.desc[currentLang] || cmd.desc.en).toLowerCase().includes(f);
    }

    function renderAll(filter = '') {
      for (const [key, list] of Object.entries(COMMANDS)) {
        const grid = document.getElementById('grid-' + key);
        const visible = list.filter(c => matches(c, filter));
        grid.innerHTML = visible.map(cardHTML).join('') ||
          '<div style="opacity:0.4;font-size:0.85rem;padding:8px 4px;">—</div>';
      }
    }

    applyTranslations();
    renderAll();
  </script>
